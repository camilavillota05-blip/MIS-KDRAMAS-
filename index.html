<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Mis Dramas Coreanos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #f8bbd0, #e1bee7, #ede7f6);
      margin: 0;
      padding: 30px 15px;
    }
    h1 { text-align: center; color: #6a1b9a; font-size: 34px; margin-bottom: 40px; }
    h2 { color: #8e24aa; }
    .formulario, .lista {
      background: linear-gradient(135deg, #ffffff, #faf5ff);
      max-width: 950px;
      margin: 25px auto;
      padding: 35px;
      border-radius: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
    }
    input, textarea, select {
      padding: 14px;
      border-radius: 18px;
      border: none;
      background: #f3e5f5;
    }
    textarea { margin-top: 15px; }
    button {
      margin-top: 30px;
      padding: 16px;
      background: linear-gradient(135deg, #ec407a, #ab47bc);
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 40px;
      cursor: pointer;
    }
    .poster {
      width: 100%;
      max-height: 300px;
      object-fit: cover;
      border-radius: 20px;
      margin-bottom: 15px;
    }
    .drama {
      background: linear-gradient(135deg, #ffffff, #fce4ec);
      border-radius: 28px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.18);
    }
    .titulo { font-size: 22px; font-weight: bold; color: #6a1b9a; }
    .sub { color: #777; margin-bottom: 10px; }
    .sinopsis { background: #ede7f6; padding: 12px; border-radius: 18px; margin-top: 10px; }
    .acciones button {
      margin-right: 10px;
      margin-top: 15px;
      padding: 10px 18px;
      border-radius: 25px;
      font-size: 14px;
    }
    .editar { background:#7b1fa2; }
    .eliminar { background:#c62828; }
    .estrellas span {
      font-size: 28px;
      color: #ccc;
    }
    .estrellas span.activa { color: #fbc02d; }
  </style>
</head>
<body>

<h1>🌸 Mi Registro de Dramas Coreanos 🌸</h1>

<div class="lista">
  <h2>Dramas registrados (A–Z)</h2>
  <div id="listaDramas"></div>
</div>

<script>
let dramas = [
  {
    nombreOriginal: "Crash Landing on You",
    nombreEspanol: "Aterrizaje de emergencia en tu corazón",
    genero: "Romance, Drama",
    episodios: 16,
    clasificacionDrama: "13+",
    clasificacionPersonal: 5,
    anio: 2019,
    plataforma: "Netflix",
    estado: "Terminado",
    fechaInicio: "",
    fechaFinal: "",
    periodoEmision: "2019-2020",
    sinopsis: "Una heredera surcoreana cae en Corea del Norte y conoce a un oficial.",
    imagen: "https://upload.wikimedia.org/wikipedia/en/5/5a/Crash_Landing_on_You_main_poster.jpg"
  },
  {
    nombreOriginal: "Goblin",
    nombreEspanol: "El guardián",
    genero: "Fantasía, Romance",
    episodios: 16,
    clasificacionDrama: "13+",
    clasificacionPersonal: 5,
    anio: 2016,
    plataforma: "Viki",
    estado: "Terminado",
    fechaInicio: "",
    fechaFinal: "",
    periodoEmision: "2016-2017",
    sinopsis: "Un ser inmortal busca a su novia para romper su maldición.",
    imagen: "https://upload.wikimedia.org/wikipedia/en/3/3d/Guardian_The_Lonely_and_Great_God.jpg"
  }
];

function ordenar() {
  dramas.sort((a,b)=>a.nombreOriginal.localeCompare(b.nombreOriginal));
}

function render() {
  const lista = document.getElementById("listaDramas");
  lista.innerHTML = '';
  ordenar();

  dramas.forEach(d => {
    const div = document.createElement('div');
    div.className = 'drama';

    div.innerHTML = `
      <img src="${d.imagen}" class="poster">
      <div class="titulo">${d.nombreOriginal}</div>
      <div class="sub">${d.genero} · ${d.anio}</div>
      <div class="sinopsis">${d.sinopsis}</div>
    `;

    lista.appendChild(div);
  });
}

render();
</script>

</body>
</html>
